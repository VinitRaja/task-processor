# MySQL datasource config
spring.datasource.url=jdbc:mysql://localhost:3306/taskdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Cache config
spring.cache.type=caffeine
# Caffeine cache spec: maximumSize=100, expireAfterWrite=600s (10 min TTL)
spring.cache.caffeine.spec=maximumSize=100,expireAfterWrite=600s